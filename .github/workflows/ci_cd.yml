name: TG bot Pipeline

on:
  push:
    branches: [ "master" ]
jobs:
  #test stage
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn clean test

  #build stage
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: mvn package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
  #docker + push
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Build and Push Image
        run: docker buildx build --push -t ${{ secrets.DOCKER_USERNAME }}/planning_tg_bot:latest .
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.SSH_HOST}}
          username: ${{secrets.SSH_USER}}
          key: ${{secrets.SSH_KEY}}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker pull ${{secrets.DOCKER_USERNAME}}/planning_tg_bot:latest
            docker stop app || true
            docker rm app || true
            docker run -d --name app \
            --network host \
            --dns 8.8.8.8 --dns 1.1.1.1 \
            -e telegram.bot.token=${{ secrets.BOT_TOKEN }} \
            -e telegram.bot.username=${{ secrets.BOT_USERNAME }} \
            -e _JAVA_OPTIONS="-Dhttps.proxyHost=127.0.0.1 -Dhttps.proxyPort=1080 -Dhttps.proxyType=SOCKS5" \
              ${{secrets.DOCKER_USERNAME}}/planning_tg_bot:latest